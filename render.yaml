services:
  - type: web
    name: scgk114-api
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run serve:mvp
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_API_KEY
        sync: false
