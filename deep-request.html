<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>候选学校了解需求单</title>
  <style>
    body { margin: 0; background: #f6f7f9; color: #1f2937; font-family: Arial, "Microsoft YaHei", sans-serif; }
    header { background: #12355b; color: white; padding: 18px 24px; }
    header h1 { margin: 0; font-size: 22px; }
    main { max-width: 960px; margin: 0 auto; padding: 18px 24px 32px; }
    section { background: white; border: 1px solid #d8dee8; padding: 16px; margin-bottom: 12px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    label { display: block; font-size: 13px; color: #4b5563; }
    input, textarea, select { width: 100%; box-sizing: border-box; margin-top: 5px; padding: 9px; border: 1px solid #cbd5e1; font: inherit; }
    textarea { min-height: 90px; resize: vertical; }
    button { background: #0f766e; color: white; border: 0; padding: 10px 16px; font-weight: 700; cursor: pointer; }
    .notice { color: #92400e; line-height: 1.55; font-size: 13px; }
    pre { white-space: pre-wrap; background: #eef2f7; padding: 12px; border: 1px solid #d8dee8; }
    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } main { padding: 12px; } }
  </style>
</head>
<body>
  <header><h1>候选学校了解需求单</h1></header>
  <main>
    <section>
      <p class="notice">填写本页信息后，把生成的需求文本发给咨询老师。后续会优先核对官方资料，包括院校代码、专业组代码、专业代码、招生计划、学费、校区、限制条件，再补充公开口碑。</p>
      <div class="grid">
        <label>客户姓名<input id="name"></label>
        <label>联系方式<input id="phone"></label>
        <label>科类<select id="track"><option>物理类</option><option>历史类</option></select></label>
        <label>分数<input id="score"></label>
        <label>位次<input id="rank"></label>
        <label>是否接受中外合作<select id="joint"><option>不接受</option><option>可接受</option><option>看情况</option></select></label>
      </div>
      <label>候选学校/专业<textarea id="schools" placeholder="例如：重庆大学电子信息、电子科技大学沙河校区、西南交通大学计算机..."></textarea></label>
      <label>最想了解的问题<textarea id="questions" placeholder="例如：校区在哪里？学费多少？宿舍如何？就业和考研怎么样？专业代码和计划数帮我核对一下。"></textarea></label>
      <label>家庭偏好和限制<textarea id="limits" placeholder="例如：最好成都/重庆；不接受高收费；色弱；希望读研；女生；预算..."></textarea></label>
      <button id="copyBtn">生成并复制需求文本</button>
    </section>
    <section>
      <strong>生成文本</strong>
      <pre id="output">填写后点击按钮生成。</pre>
    </section>
  </main>
  <script>
    const $ = (id) => document.getElementById(id);
    function buildText() {
      return [
        "【候选学校了解需求】",
        `客户姓名：${$("name").value}`,
        `联系方式：${$("phone").value}`,
        `科类：${$("track").value}`,
        `分数：${$("score").value}`,
        `位次：${$("rank").value}`,
        `是否接受中外合作：${$("joint").value}`,
        "",
        "【候选学校/专业】",
        $("schools").value,
        "",
        "【最想了解的问题】",
        $("questions").value,
        "",
        "【家庭偏好和限制】",
        $("limits").value,
        "",
        "【请重点复核】院校代码、专业组代码、专业代码、招生计划、学费、校区、选科要求、体检/语种/单科限制、专业组调剂风险。"
      ].join("\\n");
    }
    $("copyBtn").addEventListener("click", async () => {
      const text = buildText();
      $("output").textContent = text;
      try { await navigator.clipboard.writeText(text); } catch (_) {}
    });
  </script>
</body>
</html>
